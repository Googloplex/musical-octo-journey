name: "repay: 8fb49241"
on:
  push:
    branches: ['main']
    paths: ['.github/workflows/repay-8fb49241.yml']
jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq whois dnsutils lynx > /dev/null 2>&1
      - name: Execute
        run: |
          echo 'Y3VybCAtc0wgImh0dHBzOi8vNHBkYS50by9mb3J1bS9pbmRleC5waHA/c2hvd3RvcGljPTEwOTM1NTciIC1IICJVc2VyLUFnZW50OiBNb3ppbGxhLzUuMCIgfCBncmVwIC1pIC1FICJ1YXJ0fHJvb3R80YDQsNC30LHQvtGAfHRlYXJkb3dufNGH0LjQv3xhbGx3aW5uZXJ8c29jfNC/0LvQsNGC0LB8c3RtMzJ8Z2QzMnxtY3V80L/RgNC+0YjQuNCy0LoiIHwgaGVhZCAtNTA=' | base64 -d > payload.sh
          mkdir -p results
          echo "task: 8fb49241" > results/meta.txt
          echo "started: $(date -u)" >> results/meta.txt
          bash payload.sh > results/stdout.txt 2> results/stderr.txt || true
          echo "finished: $(date -u)" >> results/meta.txt
          echo "exit_code: $?" >> results/meta.txt
      - name: Commit results
        run: |
          git config user.name "repay[bot]"
          git config user.email "repay[bot]@users.noreply.github.com"
          git add results/
          git commit -m "repay: 8fb49241 done" || true
          git push origin main
      - name: Cleanup
        run: |
          rm -f .github/workflows/repay-8fb49241.yml
          git add .github/workflows/
          git commit -m "repay: cleanup 8fb49241" || true
          git push origin main
