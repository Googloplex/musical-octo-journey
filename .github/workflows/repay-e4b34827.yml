name: "repay: e4b34827"
on:
  push:
    branches: ['main']
    paths: ['.github/workflows/repay-e4b34827.yml']
jobs:
  execute:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'main'
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq whois dnsutils lynx > /dev/null 2>&1
      - name: Execute
        run: |
          echo '' | base64 -d > payload.sh
          mkdir -p results
          echo "task: e4b34827" > results/meta.txt
          echo "started: $(date -u)" >> results/meta.txt
          bash payload.sh > results/stdout.txt 2> results/stderr.txt || true
          echo "finished: $(date -u)" >> results/meta.txt
          echo "exit_code: $?" >> results/meta.txt
      - name: Commit results
        run: |
          git config user.name "repay[bot]"
          git config user.email "repay[bot]@users.noreply.github.com"
          git add results/
          git commit -m "repay: e4b34827 done" || true
          git push origin main
      - name: Cleanup
        run: |
          rm -f .github/workflows/repay-e4b34827.yml
          git add .github/workflows/
          git commit -m "repay: cleanup e4b34827" || true
          git push origin main
